name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (CPU torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Unit tests (CPU deterministic)
        run: pytest -q -m "not smoke"
      - name: Smoke-train tests
        run: pytest -q -m smoke || { [ $? -eq 5 ] && echo "no smoke tests yet"; }
      - name: Golden-vector checks (once exports exist)
        run: |
          if ls export/golden/*.json >/dev/null 2>&1; then
            node export/js/check_golden.mjs --all
          else
            echo "no golden vectors yet; skipping"
          fi
